name: 🧩 New DNS provider support
description: Request for the support of a new DNS provider.
title: "Support for provider: <put the name of your provider>"
labels: [enhancement, new-provider]
body:
  - type: checkboxes
    id: terms
    attributes:
      label: Welcome
      options:
        - label: Yes, I've searched for similar issues on GitHub and didn't find any.
          required: true
        - label: Yes, the DNS provider has a documented API.
          required: true
        - label: Yes, I know that the lego maintainers don't have an account in all DNS providers in the world.
          required: true

  - type: checkboxes
    id: pr
    attributes:
      label: Implementation
      options:
        - label: Yes, I'm able to create a pull request and be able to maintain the implementation.
          required: false
        - label: Yes, I can test an implementation with the help of the maintainers if someone creates a pull request.
          required: false

  - type: input
    id: provider-link
    attributes:
      label: Link to the DNS provider
      placeholder: Put your link here.
    validations:
      required: true

  - type: input
    id: api-link
    attributes:
      label:  Link to the API documentation
      placeholder: Put your link here.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Additional Notes
      placeholder: Your notes.
    validations:
      required: false

  - type: dropdown
    id: type
    attributes:
      label: How do you use lego?
      options:
        - I don't know
        - Library
        - Binary
        - Docker image
        - go install
        - Through 1Panel
        - Through Bitnami
        - Through Caddy
        - Through Certimate
        - Through Dokku plugin
        - Through Home Assistant plugin
        - Through Terraform ACME provider
        - Through Traefik
        - Through Zoraxy
        - Other (please explain)
    validations:
      required: true

  - type: dropdown
    id: profile
    attributes:
      label: Who are you?
      options:
        - I don't know
        - A customer of this DNS provider
        - An employee of this DNS provider
        - An employee of an ACME CA
        - Other (please explain)
    validations:
      required: true

  - type: dropdown
    id: usage
    attributes:
      label: In which context are you using lego?
      options:
        - I don't know
        - Personal use
        - Professional use
        - Personal and professional use
        - Other (please explain)
    validations:
      required: true

  - type: checkboxes
    id: validation
    attributes:
      label: Validation
      options:
        - label: Yes, I've included all the information above (version, usage, etc.).
          required: true

  - type: checkboxes
    id: value-affirmation
    attributes:
      label: 🌱 Supporting the Maintainer
      options:
        - label: "I find this project useful, and it has saved me time in my workflow/business."
          required: false
        - label: "I have starred this repository to help other developers find it."
          required: false

  - type: markdown
    attributes:
      value: |
        To keep the project stable and ensure I can continue responding to issues quickly, please consider **[sponsoring my work](https://donate.ldez.dev)**.
        
        Your support ensures this tool remains a reliable part of your toolkit for years to come.

        [Support Project Longevity →](https://donate.ldez.dev)
